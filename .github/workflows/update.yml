name: Atualizar notícias SNS

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 20

      - run: npm install
      - run: node scraper.js

      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add noticias.json
          git commit -m "Atualizar notícias" || echo "Sem alterações"
          git push
