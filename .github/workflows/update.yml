name: Atualizar notícias SNS

on:
  schedule:
    - cron: "0 */3 * * *" # a cada 3 horas
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Instalar dependências
        run: npm install

      - name: Executar scraper
        run: node scraper.js

      - name: Commit e push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add noticias.json
          git commit -m "Atualizar notícias" || echo "Sem alterações"
          git push
